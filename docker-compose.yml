services:
  db:
    image: postgres:16
    container_name: sensey_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sensey}
      POSTGRES_USER: ${POSTGRES_USER:-sensey}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sensey}
    ports:
      - "5424:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    container_name: sensey_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  pgdata:
